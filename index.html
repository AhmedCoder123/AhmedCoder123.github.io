<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIE AS-Level Science Grade Calculator (June 2025 Edition)</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN for compiling JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-teal-500 selection:text-slate-950 grid-bg">
  <div id="root"></div>

  <script type="text/babel">
    // Deconstruct React hooks
    const { useState, useEffect } = React;

    // Official June 2025 Option Combinations (S-options) taken directly from CAIE Threshold PDFs
    // For Physics: Referencing "740343-physics-9702-june-2025-grade-threshold-table.pdf"
    // For Biology: Referencing "740286-biology-9700-june-2025-grade-threshold-table.pdf"
    const JUNE_2025_OPTIONS = {
      physics: {
        S1: { A: 94, B: 85, C: 73, D: 62, E: 51, label: "S1 (11, 21, 31) - Variant 1" },
        S2: { A: 94, B: 83, C: 72, D: 61, E: 50, label: "S2 (11, 21, 32) - Variant 1" },
        S3: { A: 97, B: 85, C: 72, D: 59, E: 46, label: "S3 (12, 22, 33) - Variant 2" },
        S4: { A: 96, B: 83, C: 70, D: 57, E: 45, label: "S4 (12, 22, 34) - Variant 2" },
        S5: { A: 95, B: 83, C: 70, D: 58, E: 46, label: "S5 (13, 23, 35) - Variant 3" },
        SA: { A: 92, B: 79, C: 67, D: 55, E: 44, label: "SA (14, 24, 37) - Variant 4" },
        SB: { A: 91, B: 77, C: 65, D: 54, E: 43, label: "SB (14, 24, 38) - Variant 4" }
      },
      chemistry: {
        S1: { A: 87, B: 73, C: 59, D: 46, E: 33, label: "S1 (11, 21, 31) - Variant 1" },
        S2: { A: 86, B: 72, C: 58, D: 45, E: 32, label: "S2 (11, 21, 32) - Variant 1" },
        S3: { A: 83, B: 68, C: 57, D: 46, E: 35, label: "S3 (12, 22, 33) - Variant 2" },
        S4: { A: 81, B: 66, C: 55, D: 44, E: 33, label: "S4 (12, 22, 34) - Variant 2" },
        S5: { A: 89, B: 74, C: 63, D: 53, E: 43, label: "S5 (13, 23, 35) - Variant 3" },
        S6: { A: 87, B: 71, C: 61, D: 51, E: 42, label: "S6 (13, 23, 36) - Variant 3" },
        S7: { A: 89, B: 72, C: 61, D: 51, E: 41, label: "S7 (14, 24, 37) - Variant 4" },
        S8: { A: 87, B: 69, C: 59, D: 49, E: 40, label: "S8 (14, 24, 38) - Variant 4" }
      },
      biology: {
        S1: { A: 90, B: 80, C: 69, D: 59, E: 49, label: "S1 (11, 21, 31) - Variant 1" },
        S2: { A: 90, B: 81, C: 70, D: 60, E: 50, label: "S2 (11, 21, 32) - Variant 1" },
        S3: { A: 85, B: 73, C: 63, D: 53, E: 43, label: "S3 (12, 22, 33) - Variant 2" },
        S4: { A: 86, B: 75, C: 65, D: 55, E: 45, label: "S4 (12, 22, 34) - Variant 2" },
        S5: { A: 94, B: 84, C: 74, D: 65, E: 56, label: "S5 (13, 23, 35) - Variant 3" },
        S7: { A: 89, B: 76, C: 66, D: 56, E: 46, label: "S7 (14, 24, 37) - Variant 4" },
        S8: { A: 90, B: 78, C: 68, D: 58, E: 48, label: "S8 (14, 24, 38) - Variant 4" }
      }
    };

    // Historical CIE thresholds out of 130 weighted marks
    const GRADE_PRESETS = {
      june2024: {
        name: "June 2024 CIE Series",
        physics: { A: 96, B: 83, C: 70, D: 57, E: 45 },
        chemistry: { A: 93, B: 79, C: 65, D: 52, E: 39 },
        biology: { A: 95, B: 82, C: 69, D: 56, E: 44 }
      },
      nov2023: {
        name: "Nov 2023 CIE Series",
        physics: { A: 94, B: 81, C: 68, D: 55, E: 43 },
        chemistry: { A: 91, B: 77, C: 63, D: 50, E: 37 },
        biology: { A: 92, B: 80, C: 68, D: 56, E: 44 }
      },
      standard: {
        name: "Standard Curve (75% for A)",
        physics: { A: 97, B: 84, C: 71, D: 58, E: 45 },
        chemistry: { A: 97, B: 84, C: 71, D: 58, E: 45 },
        biology: { A: 97, B: 84, C: 71, D: 58, E: 45 }
      }
    };

    // Lucide Icon Component Helper
    function Icon({ name, className = "w-5 h-5", ...props }) {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
      return <i data-lucide={name} className={className} {...props}></i>;
    }

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [studentName, setStudentName] = useState('');
      const [selectedPreset, setSelectedPreset] = useState('june2025');
      
      // Dynamic variant states for June 2025 selector (Zone 4 Variant 2 Defaults)
      const [selectedVariants, setSelectedVariants] = useState({
        physics: 'S3',
        chemistry: 'S3',
        biology: 'S3'
      });

      // Customized user boundaries state
      const [customThresholds, setCustomThresholds] = useState({
        physics: { A: 97, B: 85, C: 72, D: 59, E: 46 },
        chemistry: { A: 83, B: 68, C: 57, D: 46, E: 35 },
        biology: { A: 85, B: 73, C: 63, D: 53, E: 43 }
      });

      // Marks state
      const [marks, setMarks] = useState({
        physics: { p1: '', p2: '', p3: '' },
        chemistry: { p1: '', p2: '', p3: '' },
        biology: { p1: '', p2: '', p3: '' }
      });

      const [copied, setCopied] = useState(false);

      // What-If Solver states
      const [targetSubject, setTargetSubject] = useState('physics');
      const [targetGrade, setTargetGrade] = useState('A');
      const [knownPapers, setKnownPapers] = useState({
        p1: { active: true, value: '' },
        p2: { active: true, value: '' },
        p3: { active: false, value: '' }
      });

      // Keep thresholds aligned whenever preset or variant selection updates
      useEffect(() => {
        if (selectedPreset === 'june2025') {
          setCustomThresholds({
            physics: { ...JUNE_2025_OPTIONS.physics[selectedVariants.physics] },
            chemistry: { ...JUNE_2025_OPTIONS.chemistry[selectedVariants.chemistry] },
            biology: { ...JUNE_2025_OPTIONS.biology[selectedVariants.biology] }
          });
        } else if (selectedPreset !== 'custom') {
          setCustomThresholds({
            physics: { ...GRADE_PRESETS[selectedPreset].physics },
            chemistry: { ...GRADE_PRESETS[selectedPreset].chemistry },
            biology: { ...GRADE_PRESETS[selectedPreset].biology }
          });
        }
      }, [selectedPreset, selectedVariants]);

      const maxMarks = { p1: 40, p2: 60, p3: 40 };
      const weights = { p1: 1.0, p2: 1.0, p3: 0.75 };

      const calculateSubjectData = (subject) => {
        const rawP1 = parseFloat(marks[subject].p1) || 0;
        const rawP2 = parseFloat(marks[subject].p2) || 0;
        const rawP3 = parseFloat(marks[subject].p3) || 0;

        const isP1Valid = rawP1 >= 0 && rawP1 <= maxMarks.p1;
        const isP2Valid = rawP2 >= 0 && rawP2 <= maxMarks.p2;
        const isP3Valid = rawP3 >= 0 && rawP3 <= maxMarks.p3;

        const weightedP1 = rawP1 * weights.p1;
        const weightedP2 = rawP2 * weights.p2;
        const weightedP3 = rawP3 * weights.p3;

        const rawTotal = rawP1 + rawP2 + rawP3;
        const weightedTotal = Math.round((weightedP1 + weightedP2 + weightedP3) * 100) / 100;
        const percentage = Math.round((weightedTotal / 130) * 100 * 10) / 10;

        const subThreshold = customThresholds[subject] || { A: 90, B: 80, C: 73, D: 62, E: 51 };
        let grade = 'U';
        if (weightedTotal >= subThreshold.A) grade = 'A';
        else if (weightedTotal >= subThreshold.B) grade = 'B';
        else if (weightedTotal >= subThreshold.C) grade = 'C';
        else if (weightedTotal >= subThreshold.D) grade = 'D';
        else if (weightedTotal >= subThreshold.E) grade = 'E';

        const hasAnyInput = marks[subject].p1 !== '' || marks[subject].p2 !== '' || marks[subject].p3 !== '';

        return {
          rawP1, rawP2, rawP3,
          weightedP1, weightedP2, weightedP3,
          rawTotal, weightedTotal, percentage, grade,
          hasAnyInput,
          isValid: isP1Valid && isP2Valid && isP3Valid
        };
      };

      const physicsData = calculateSubjectData('physics');
      const chemistryData = calculateSubjectData('chemistry');
      const biologyData = calculateSubjectData('biology');

      const handleMarkChange = (subject, paper, val) => {
        if (val === '') {
          setMarks(prev => ({
            ...prev,
            [subject]: { ...prev[subject], [paper]: '' }
          }));
          return;
        }

        const num = parseFloat(val);
        if (!isNaN(num) && num >= 0 && num <= maxMarks[paper]) {
          setMarks(prev => ({
            ...prev,
            [subject]: { ...prev[subject], [paper]: num }
          }));
        }
      };

      const fillMockMarks = () => {
        setMarks({
          physics: { p1: 32, p2: 44, p3: 28 },
          chemistry: { p1: 30, p2: 41, p3: 32 },
          biology: { p1: 35, p2: 46, p3: 30 }
        });
      };

      const clearMarks = () => {
        setMarks({
          physics: { p1: '', p2: '', p3: '' },
          chemistry: { p1: '', p2: '', p3: '' },
          biology: { p1: '', p2: '', p3: '' }
        });
      };

      const handleCopySummary = () => {
        const generateSummaryText = () => {
          let txt = `=== AS-LEVEL SCIENCE GRADE REPORT ===\n`;
          if (studentName) txt += `Student: ${studentName}\n`;
          txt += `Selected Curve: ${selectedPreset === 'june2025' ? 'June 2025 Series' : selectedPreset === 'custom' ? 'Custom Editor' : GRADE_PRESETS[selectedPreset].name}\n`;
          if (selectedPreset === 'june2025') {
            txt += `Physics Variant: ${selectedVariants.physics}\n`;
            txt += `Chemistry Variant: ${selectedVariants.chemistry}\n`;
            txt += `Biology Variant: ${selectedVariants.biology}\n`;
          }
          txt += `\n`;

          ['physics', 'chemistry', 'biology'].forEach(sub => {
            const data = calculateSubjectData(sub);
            if (data.hasAnyInput) {
              txt += `${sub.toUpperCase()}:\n`;
              txt += ` - P1 (MCQ): ${marks[sub].p1 || 0}/${maxMarks.p1} raw (Weighted: ${data.weightedP1})\n`;
              txt += ` - P2 (Theory): ${marks[sub].p2 || 0}/${maxMarks.p2} raw (Weighted: ${data.weightedP2})\n`;
              txt += ` - P3 (Practical): ${marks[sub].p3 || 0}/${maxMarks.p3} raw (Weighted: ${data.weightedP3})\n`;
              txt += ` - Weighted Score: ${data.weightedTotal}/130 (${data.percentage}%)\n`;
              txt += ` - Projected AS Grade: ${data.grade}\n\n`;
            }
          });
          txt += `Generated via Cambridge Weighted Grade Assistant.`;
          return txt;
        };

        const textToCopy = generateSummaryText();
        const textarea = document.createElement('textarea');
        textarea.value = textToCopy;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Failed to copy', err);
        } finally {
          document.body.removeChild(textarea);
        }
      };

      const calculateTargetRequirement = () => {
        const thresholds = customThresholds[targetSubject] || { A: 90, B: 80, C: 73, D: 62, E: 51 };
        const targetScore = thresholds[targetGrade] || 90;

        const activeStates = [knownPapers.p1.active, knownPapers.p2.active, knownPapers.p3.active];
        const activeCount = activeStates.filter(Boolean).length;

        // Defensive fallbacks to prevent runtime null pointers during setup updates
        if (activeCount !== 2) {
          return { 
            error: 'Please select exactly two active (known) papers to solve for the third.',
            solvedPaper: 'p3',
            targetScore,
            knownWeighted: 0,
            neededWeighted: 0,
            neededRaw: 0,
            isPossible: false,
            isAlreadySecured: false
          };
        }

        const solvedPaper = !knownPapers.p1.active ? 'p1' : !knownPapers.p2.active ? 'p2' : 'p3';

        const p1Val = knownPapers.p1.active ? (parseFloat(knownPapers.p1.value) || 0) : 0;
        const p2Val = knownPapers.p2.active ? (parseFloat(knownPapers.p2.value) || 0) : 0;
        const p3Val = knownPapers.p3.active ? (parseFloat(knownPapers.p3.value) || 0) : 0;

        const knownWeighted = (knownPapers.p1.active ? p1Val * weights.p1 : 0) +
                              (knownPapers.p2.active ? p2Val * weights.p2 : 0) +
                              (knownPapers.p3.active ? p3Val * weights.p3 : 0);

        const neededWeighted = targetScore - knownWeighted;
        const neededRaw = neededWeighted / weights[solvedPaper];
        const roundedNeededRaw = Math.ceil(neededRaw * 2) / 2;

        return {
          solvedPaper,
          targetScore,
          knownWeighted,
          neededWeighted,
          neededRaw: roundedNeededRaw,
          isPossible: roundedNeededRaw <= maxMarks[solvedPaper],
          isAlreadySecured: roundedNeededRaw <= 0
        };
      };

      const targetResult = calculateTargetRequirement();

      return (
        <div className="min-h-screen pb-12">
          <header className="border-b border-slate-900 bg-slate-900/40 backdrop-blur-md sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-xl shadow-lg shadow-teal-500/10">
                  <Icon name="calculator" className="w-6 h-6 text-slate-950 stroke-[2.5]" />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-teal-200 via-slate-100 to-emerald-200 bg-clip-text text-transparent">
                    CIE AS-Level Science Calculator
                  </h1>
                  <p className="text-xs text-slate-400">Physics, Chemistry, & Biology • Weighted to 130 Marks</p>
                </div>
              </div>
              
              <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-end">
                <input 
                  type="text" 
                  placeholder="Enter Student Name..."
                  value={studentName}
                  onChange={(e) => setStudentName(e.target.value)}
                  className="bg-slate-900 border border-slate-800 text-sm px-3.5 py-1.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-100 placeholder:text-slate-500 w-full sm:w-48"
                />
                <button
                  onClick={fillMockMarks}
                  className="px-3 py-1.5 bg-slate-800/80 hover:bg-slate-800 border border-slate-700/60 rounded-lg text-xs font-semibold flex items-center gap-1.5 text-slate-300 transition-colors"
                  title="Populate with sample high grade marks"
                >
                  <Icon name="sparkles" className="w-3.5 h-3.5 text-yellow-400" /> Demo Marks
                </button>
                <button
                  onClick={clearMarks}
                  className="px-3 py-1.5 bg-rose-950/40 hover:bg-rose-950/70 border border-rose-900/50 rounded-lg text-xs font-semibold flex items-center gap-1.5 text-rose-300 transition-colors"
                >
                  <Icon name="rotate-ccw" className="w-3.5 h-3.5" /> Clear
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            
            {/* CIE Scaling Explanation Panel */}
            <div className="bg-gradient-to-r from-blue-950/40 to-slate-900 border border-blue-900/50 rounded-2xl p-5 mb-8 flex flex-col md:flex-row md:items-center gap-5 justify-between">
              <div className="flex gap-4 items-start">
                <div className="p-3 bg-blue-500/10 rounded-xl shrink-0 mt-0.5">
                  <Icon name="info" className="w-6 h-6 text-blue-400" />
                </div>
                <div>
                  <h4 className="text-sm font-semibold text-blue-300">Cambridge Scaling Mechanism Explained</h4>
                  <p className="text-xs text-slate-300 leading-relaxed mt-1 max-w-4xl">
                    Although the raw totals of AS Physics, Chemistry, & Biology papers sum up to <strong className="text-white">140 marks</strong> (P1: 40, P2: 60, P3: 40), CAIE applies a scaling factor to P3 of <strong className="text-white">0.75</strong>. This shifts the practical component weight down to 30 marks, bringing the grand final syllabus total to <strong className="text-white">130 marks</strong>.
                  </p>
                </div>
              </div>
              <div className="flex items-center gap-2 font-mono text-xs text-slate-400 shrink-0 border-t md:border-t-0 border-slate-800 pt-3 md:pt-0">
                <div className="bg-slate-950/60 px-3 py-2 rounded-lg border border-slate-800/80">P1 Weight: 1.00</div>
                <div className="bg-slate-950/60 px-3 py-2 rounded-lg border border-slate-800/80">P2 Weight: 1.00</div>
                <div className="bg-slate-950/60 px-3 py-2 rounded-lg border border-slate-800/80">P3 Weight: 0.75</div>
              </div>
            </div>

            {/* Navigation Tabs */}
            <div className="flex flex-wrap items-center gap-2 mb-6 border-b border-slate-900 pb-px overflow-x-auto scrollbar-none">
              <button
                onClick={() => setActiveTab('dashboard')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'dashboard' 
                    ? 'border-teal-500 text-teal-400 bg-teal-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <Icon name="award" className="w-4 h-4" /> Comprehensive Dashboard
              </button>
              
              <button
                onClick={() => setActiveTab('physics')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'physics' 
                    ? 'border-cyan-500 text-cyan-400 bg-cyan-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <span className="w-2.5 h-2.5 rounded-full bg-cyan-500"></span> Physics (9702)
              </button>

              <button
                onClick={() => setActiveTab('chemistry')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'chemistry' 
                    ? 'border-violet-500 text-violet-400 bg-violet-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <span className="w-2.5 h-2.5 rounded-full bg-violet-500"></span> Chemistry (9701)
              </button>

              <button
                onClick={() => setActiveTab('biology')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'biology' 
                    ? 'border-emerald-500 text-emerald-400 bg-emerald-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> Biology (9700)
              </button>

              <button
                onClick={() => setActiveTab('whatif')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'whatif' 
                    ? 'border-amber-500 text-amber-400 bg-amber-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <Icon name="trending-up" className="w-4 h-4 text-amber-400" /> "What-If" Targeter
              </button>

              <button
                onClick={() => setActiveTab('thresholds')}
                className={`px-4 py-2.5 rounded-t-xl text-sm font-medium transition-all flex items-center gap-2 shrink-0 border-b-2 ${
                  activeTab === 'thresholds' 
                    ? 'border-pink-500 text-pink-400 bg-pink-950/10' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-900/30'
                }`}
              >
                <Icon name="sliders" className="w-4 h-4 text-pink-400" /> Threshold Presets
              </button>
            </div>

            {/* Dashboard tab template */}
            {activeTab === 'dashboard' && (
              <div className="space-y-8 animate-fadeIn">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  
                  {/* Preset Standard Selector Card */}
                  <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between">
                    <div>
                      <h3 className="text-sm font-bold text-slate-200 flex items-center gap-2">
                        <Icon name="sliders" className="w-4 h-4 text-teal-400" /> Threshold Standard Selector
                      </h3>
                      <p className="text-xs text-slate-400 mt-1">Select the official grade boundary series to gauge your results.</p>
                    </div>
                    
                    <div className="mt-4 grid grid-cols-2 gap-2">
                      <button
                        onClick={() => setSelectedPreset('june2025')}
                        className={`px-2 py-2.5 rounded-xl border text-xs font-semibold transition-all ${
                          selectedPreset === 'june2025' 
                            ? 'bg-teal-500/20 text-teal-400 border-teal-500' 
                            : 'bg-slate-950/40 text-slate-400 border-slate-800 hover:bg-slate-800/40'
                        }`}
                      >
                        June 2025 (Official)
                      </button>
                      <button
                        onClick={() => setSelectedPreset('june2024')}
                        className={`px-2 py-2.5 rounded-xl border text-xs font-semibold transition-all ${
                          selectedPreset === 'june2024' 
                            ? 'bg-teal-500/20 text-teal-400 border-teal-500' 
                            : 'bg-slate-950/40 text-slate-400 border-slate-800 hover:bg-slate-800/40'
                        }`}
                      >
                        June 2024
                      </button>
                      <button
                        onClick={() => setSelectedPreset('nov2023')}
                        className={`px-2 py-2.5 rounded-xl border text-xs font-semibold transition-all ${
                          selectedPreset === 'nov2023' 
                            ? 'bg-teal-500/20 text-teal-400 border-teal-500' 
                            : 'bg-slate-950/40 text-slate-400 border-slate-800 hover:bg-slate-800/40'
                        }`}
                      >
                        Nov 2023
                      </button>
                      <button
                        onClick={() => setSelectedPreset('standard')}
                        className={`px-2 py-2.5 rounded-xl border text-xs font-semibold transition-all ${
                          selectedPreset === 'standard'

                                <p className="text-[11px] text-slate-500">Max limit of 130.00</p>
                              </div>
                              <span className="text-2xl font-black text-teal-400 font-mono">{subData.weightedTotal} <span className="text-xs text-slate-500">/ 130</span></span>
                            </div>
                          </div>
                        </div>

                        {/* Gauges panel */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between">
                            <div>
                              <span className="text-xs text-slate-400 uppercase tracking-wider">Weighted Percentage</span>
                              <h4 className="text-4xl font-black mt-2 text-teal-400 font-mono">{subData.percentage}%</h4>
                            </div>
                            <div className="w-full bg-slate-950 rounded-full h-2 overflow-hidden mt-4">
                              <div className="bg-teal-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(subData.percentage, 100)}%` }}></div>
                            </div>
                          </div>
                          
                          <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between">
                            <div>
                              <span className="text-xs text-slate-400 uppercase tracking-wider">Syllabus Grade</span>
                              <div className="flex items-baseline gap-2 mt-2">
                                <h4 className="text-5xl font-black text-white">{subData.grade}</h4>
                                <span className="text-xs text-slate-400 font-semibold uppercase font-mono">
                                  {selectedPreset === 'june2025' ? `Option ${selectedVariants[activeTab]}` : ''}
                                </span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            )}

            {/* Threshold presets editor tab */}
            {activeTab === 'thresholds' && (
              <div className="space-y-6 animate-fadeIn">
                <div className="bg-gradient-to-r from-teal-950/20 to-slate-900 border border-teal-900/40 rounded-2xl p-5 flex items-start gap-4">
                  <Icon name="alert-circle" className="w-6 h-6 text-teal-400 shrink-0 mt-0.5" />
                  <div>
                    <h4 className="text-sm font-semibold text-teal-300">Official June 2025 thresholds successfully loaded</h4>
                    <p className="text-xs text-slate-300 leading-relaxed mt-1">
                      The official grade thresholds for **Physics (9702)**, **Chemistry (9701)**, and **Biology (9700)** have been embedded directly. You can use the selector dropdown below or modify individual values manually which shifts the model into <strong>"Custom Editor"</strong> mode.
                    </p>
                  </div>
                </div>

                <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                      <h2 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <Icon name="sliders" className="w-5 h-5 text-pink-500" /> Grade Boundary Customizer
                      </h2>
                    </div>
                    
                    <div className="flex flex-wrap items-center gap-2">
                      <span className="text-xs text-slate-400">Load Preset Curve:</span>
                      {Object.keys(GRADE_PRESETS).map((presetKey) => (
                        <button
                          key={presetKey}
                          onClick={() => setSelectedPreset(presetKey)}
                          className={`px-3 py-1.5 rounded-lg border text-xs font-semibold transition-all ${
                            selectedPreset === presetKey ? 'bg-pink-500/20 text-pink-400 border-pink-500' : 'bg-slate-950/40 text-slate-400 border-slate-800'
                          }`}
                        >
                          {GRADE_PRESETS[presetKey].name}
                        </button>
                      ))}
                      <button
                        onClick={() => setSelectedPreset('june2025')}
                        className={`px-3 py-1.5 rounded-lg border text-xs font-semibold transition-all ${
                          selectedPreset === 'june2025' ? 'bg-pink-500/20 text-pink-400 border-pink-500' : 'bg-slate-950/40 text-slate-400 border-slate-800'
                        }`}
                      >
                        June 2025 (Official)
                      </button>
                    </div>
                  </div>

                  {selectedPreset === 'june2025' && (
                    <div className="mb-6 p-4 bg-slate-950/50 rounded-2xl border border-slate-800 grid grid-cols-1 md:grid-cols-3 gap-4">
                      {/* Physics option picker */}
                      <div className="space-y-1">
                        <label className="text-xs font-semibold text-slate-300 block">Physics (9702) Variant Option</label>
                        <select 
                          value={selectedVariants.physics} 
                          onChange={(e) => {
                            const val = e.target.value;
                            setSelectedVariants(prev => ({ ...prev, physics: val }));
                          }}
                          className="w-full bg-slate-900 border border-slate-800 rounded-lg text-xs py-1.5 px-2.5 text-slate-200"
                        >
                          {Object.entries(JUNE_2025_OPTIONS.physics).map(([key, opt]) => (
                            <option key={key} value={key}>{key}: {opt.label}</option>
                          ))}
                        </select>
                      </div>

                      {/* Chemistry option picker */}
                      <div className="space-y-1">
                        <label className="text-xs font-semibold text-slate-300 block">Chemistry (9701) Variant Option</label>
                        <select 
                          value={selectedVariants.chemistry} 
                          onChange={(e) => {
                            const val = e.target.value;
                            setSelectedVariants(prev => ({ ...prev, chemistry: val }));
                          }}
                          className="w-full bg-slate-900 border border-slate-800 rounded-lg text-xs py-1.5 px-2.5 text-slate-200"
                        >
                          {Object.entries(JUNE_2025_OPTIONS.chemistry).map(([key, opt]) => (
                            <option key={key} value={key}>{key}: {opt.label}</option>
                          ))}
                        </select>
                      </div>

                      {/* Biology option picker */}
                      <div className="space-y-1">
                        <label className="text-xs font-semibold text-slate-300 block">Biology (9700) Variant Option</label>
                        <select 
                          value={selectedVariants.biology} 
                          onChange={(e) => {
                            const val = e.target.value;
                            setSelectedVariants(prev => ({ ...prev, biology: val }));
                          }}
                          className="w-full bg-slate-900 border border-slate-800 rounded-lg text-xs py-1.5 px-2.5 text-slate-200"
                        >
                          {Object.entries(JUNE_2025_OPTIONS.biology).map(([key, opt]) => (
                            <option key={key} value={key}>{key}: {opt.label}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {['physics', 'chemistry', 'biology'].map((subject) => (
                      <div key={subject} className="bg-slate-950/40 border border-slate-800 rounded-2xl p-5">
                        <h3 className="text-sm font-bold capitalize text-slate-200 mb-4">{subject} (Out of 130 weighted)</h3>
                        <div className="space-y-3">
                          {['A', 'B', 'C', 'D', 'E'].map((grade) => (
                            <div key={grade} className="flex items-center justify-between gap-4">
                              <span className="text-xs font-bold text-slate-400 font-mono">Grade {grade}</span>
                              <input
                                type="number"
                                value={customThresholds[subject][grade]}
                                onChange={(e) => {
                                  setSelectedPreset('custom');
                                  const val = parseFloat(e.target.value) || 0;
                                  setCustomThresholds(prev => ({ ...prev, [subject]: { ...prev[subject], [grade]: val } }));
                                }}
                                className="bg-slate-900 border border-slate-800 rounded-lg text-sm text-center py-1 w-24 font-mono text-slate-100"
                              />
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* What If Tab */}
            {activeTab === 'whatif' && (
              <div className="space-y-6 animate-fadeIn">
                <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 opacity-5 bg-gradient-to-br from-amber-400 to-yellow-500 rounded-full blur-2xl"></div>
                  <div>
                    <h2 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                      <Icon name="trending-up" className="w-5 h-5 text-amber-500" /> "What-If" Simulator & Solve Tool
                    </h2>
                    <p className="text-xs text-slate-400 mt-1">Determine exactly what score you need on a remaining paper to unlock your target AS grade.</p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-6 pt-6 border-t border-slate-800/80">
                    <div className="lg:col-span-5 space-y-6">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-xs font-semibold text-slate-300 block mb-1.5">Select Subject</label>
                          <select 
                            value={targetSubject} 
                            onChange={(e) => {
                              const val = e.target.value;
                              setTargetSubject(val);
                            }} 
                            className="w-full bg-slate-950 border border-slate-800 text-xs py-2 px-3.5 rounded-lg text-slate-200"
                          >
                            <option value="physics">Physics (9702)</option>
                            <option value="chemistry">Chemistry (9701)</option>
                            <option value="biology">Biology (9700)</option>
                          </select>
                        </div>
                        
                        <div>
                          <label className="text-xs font-semibold text-slate-300 block mb-1.5">Target Grade</label>
                          <select 
                            value={targetGrade} 
                            onChange={(e) => {
                              const val = e.target.value;
                              setTargetGrade(val);
                            }} 
                            className="w-full bg-slate-950 border border-slate-800 text-xs py-2 px-3.5 rounded-lg text-slate-200 font-mono"
                          >
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                          </select>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <h4 className="text-xs font-bold text-slate-300 uppercase tracking-wide">Determine Paper Inputs</h4>
                        
                        {/* Paper 1 solved parameter */}
                        <div className="bg-slate-950/60 p-3 rounded-xl border border-slate-800 flex items-center justify-between gap-4">
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-300 cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={knownPapers.p1.active} 
                              onChange={(e) => {
                                const checked = e.target.checked;
                                setKnownPapers(prev => ({ ...prev, p1: { ...prev.p1, active: checked } }));
                              }} 
                              className="rounded bg-slate-900 border-slate-800 text-amber-500 focus:ring-amber-500 h-4 w-4" 
                            />
                            P1 is known
                          </label>
                          {knownPapers.p1.active ? (
                            <input 
                              type="number" 
                              placeholder="0-40" 
                              value={knownPapers.p1.value} 
                              onChange={(e) => {
                                const val = e.target.value;
                                setKnownPapers(prev => ({ ...prev, p1: { ...prev.p1, value: val } }));
                              }} 
                              className="bg-slate-900 border border-slate-800 rounded-lg text-xs py-1 px-2 text-center w-20 font-mono text-slate-100" 
                            />
                          ) : <span className="text-[11px] text-amber-400 font-mono bg-amber-500/5 px-2.5 py-1 rounded border border-amber-500/10">SOLVING FOR P1</span>}
                        </div>

                        {/* Paper 2 solved parameter */}
                        <div className="bg-slate-950/60 p-3 rounded-xl border border-slate-800 flex items-center justify-between gap-4">
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-300 cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={knownPapers.p2.active} 
                              onChange={(e) => {
                                const checked = e.target.checked;
                                setKnownPapers(prev => ({ ...prev, p2: { ...prev.p2, active: checked } }));
                              }} 
                              className="rounded bg-slate-900 border-slate-800 text-amber-500 focus:ring-amber-500 h-4 w-4" 
                            />
                            P2 is known
                          </label>
                          {knownPapers.p2.active ? (
                            <input 
                              type="number" 
                              placeholder="0-60" 
                              value={knownPapers.p2.value} 
                              onChange={(e) => {
                                const val = e.target.value;
                                setKnownPapers(prev => ({ ...prev, p2: { ...prev.p2, value: val } }));
                              }} 
                              className="bg-slate-900 border border-slate-800 rounded-lg text-xs py-1 px-2 text-center w-20 font-mono text-slate-100" 
                            />
                          ) : <span className="text-[11px] text-amber-400 font-mono bg-amber-500/5 px-2.5 py-1 rounded border border-amber-500/10">SOLVING FOR P2</span>}
                        </div>

                        {/* Paper 3 solved parameter */}
                        <div className="bg-slate-950/60 p-3 rounded-xl border border-slate-800 flex items-center justify-between gap-4">
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-300 cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={knownPapers.p3.active} 
                              onChange={(e) => {
                                const checked = e.target.checked;
                                setKnownPapers(prev => ({ ...prev, p3: { ...prev.p3, active: checked } }));
                              }} 
                              className="rounded bg-slate-900 border-slate-800 text-amber-500 focus:ring-amber-500 h-4 w-4" 
                            />
                            P3 is known
                          </label>
                          {knownPapers.p3.active ? (
                            <input 
                              type="number" 
                              placeholder="0-40" 
                              value={knownPapers.p3.value} 
                              onChange={(e) => {
                                const val = e.target.value;
                                setKnownPapers(prev => ({ ...prev, p3: { ...prev.p3, value: val } }));
                              }} 
                              className="bg-slate-900 border border-slate-800 rounded-lg text-xs py-1 px-2 text-center w-20 font-mono text-slate-100" 
                            />
                          ) : <span className="text-[11px] text-amber-400 font-mono bg-amber-500/5 px-2.5 py-1 rounded border border-amber-500/10">SOLVING FOR P3</span>}
                        </div>
                      </div>
                    </div>

                    {/* Solve display panel */}
                    <div className="lg:col-span-7 flex flex-col justify-center">
                      {targetResult.error ? (
                        <div className="bg-amber-500/5 border border-amber-500/20 text-amber-300 p-6 rounded-3xl text-center">
                          <Icon name="help-circle" className="w-10 h-10 mx-auto text-amber-400 mb-3" />
                          <h4 className="text-sm font-bold">Solver Configuration Error</h4>
                          <p className="text-xs text-slate-400 mt-2">{targetResult.error}</p>
                        </div>
                      ) : (
                        <div className="bg-slate-950/60 border border-slate-800 p-6 rounded-3xl space-y-6">
                          <span className="text-xs text-slate-400 uppercase tracking-wider block">Required Target Score: {targetResult.targetScore} (out of 130 weighted)</span>
                          <div className="pt-2 text-center">
                            {targetResult.isAlreadySecured ? (
                              <div className="p-4 bg-emerald-500/15 border border-emerald-500/30 rounded-2xl text-emerald-400">
                                <p className="text-xl font-black">Already Secured Grade {targetGrade}!</p>
                              </div>
                            ) : !targetResult.isPossible ? (
                              <div className="p-4 bg-rose-500/15 border border-rose-500/30 rounded-2xl text-rose-400">
                                <p className="text-xl font-black">Impossible Target</p>
                                <p className="text-xs mt-1">Need {targetResult.neededRaw} marks in P{targetResult.solvedPaper === 'p1' ? '1' : targetResult.solvedPaper === 'p2' ? '2' : '3'}</p>
                              </div>
                            ) : (
                              <div className="p-5 bg-amber-500/15 border border-amber-500/30 rounded-2xl text-amber-400">
                                <span className="text-xs font-bold block uppercase">Required Raw Score</span>
                                <p className="text-4xl font-black mt-2 font-mono">{targetResult.neededRaw} <span className="text-lg">/ {maxMarks[targetResult.solvedPaper]}</span></p>
                                <p className="text-xs text-slate-300 mt-2">Required raw score in <strong className="uppercase">{targetResult.solvedPaper}</strong> for a {targetGrade} grade.</p>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* Footer copyright */}
          <footer className="max-w-7xl mx-auto px-4 text-center text-slate-600 text-xs mt-12 pt-6 border-t border-t-slate-900">
            <p>© 2026 Cambridge AS Weighted Grade Assistant. Designed for CAIE AS-Level Physics, Chemistry, and Biology.</p>
            <p className="mt-1">All grade calculations are estimations based on custom thresholds or official historical boundaries.</p>
          </footer>
        </div>
      );
    }

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
